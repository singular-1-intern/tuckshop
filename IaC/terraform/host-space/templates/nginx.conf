server {
  # HTTP Configuration (Recommend disabling this when not testing)
  # ─────────────────────────────────────────────────────────────────────────────────────────
  # listen 80 default_server;
  # listen [::]:80 default_server;

  # SSL Configuration
  # ─────────────────────────────────────────────────────────────────────────────────────────
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;

  ssl_certificate /etc/nginx/ssl/nginx-proxy.crt;
  ssl_certificate_key /etc/nginx/ssl/nginx-proxy.key;

  # TLS v1.3 only
  ssl_protocols TLSv1.3;             # TLS Protocols to use
  ssl_prefer_server_ciphers off;     # Specifies if server ciphers should be preferred over client ciphers when using the SSLv3 and TLS protocols.

  # TLS v1.2 and v1.3
  # ssl_protocols TLSv1.2 TLSv1.3;     # TLS Protocols to use
  # ssl_prefer_server_ciphers off;     # Specifies if server ciphers should be preferred over client ciphers when using the SSLv3 and TLS protocols.
  # ssl_ecdh_curve X25519:secp384r1;   # Specifies a curve for ECDHE ciphers.
  # ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256'; # TLSv1.2 and TLSv1.3 ciphers

  # Read up on ssl_ciphers to ensure a secure configuration.
  # See: https://bugs.debian.org/765782

  # Speed up SSL by caching session parameters
  ssl_session_cache shared:SSL:50m;    # Reduces TLS handshake overhead.
  ssl_session_timeout 1h;              # Time during which a client may reuse the session parameters.
  ssl_session_tickets off;             # Prevents session key reuse, enhancing security.

  # Note: You should disable gzip for SSL traffic.
  # See: https://bugs.debian.org/773332
  gzip off;

  # OCSP Stapling
  #   This speeds up HTTPS by allowing clients to skip OCSP certificate revocation checks. Enabling this
  #   requires that the CA's certificate chain be present on the server. (set using 'ssl_trusted_certificate')
  #   It must include the Root and Intermediate Certificates issued by your Certificate Authority.

  # ssl_stapling on;
  # ssl_stapling_verify on;
  # resolver 1.1.1.1 8.8.8.8 valid=300s;
  # resolver_timeout 5s;
  # ssl_trusted_certificate /etc/nginx/ssl/ca.pem;

  # General
  # ─────────────────────────────────────────────────────────────────────────────────────────
  http2_max_concurrent_streams 100;  # Maximum number of concurrent HTTP/2 streams in a connection.

  # Requests
  # ─────────────────────────────────────────────────────────────────────────────────────────
  client_header_buffer_size 4k;      # Buffer size for reading client request header.
  large_client_header_buffers 4 32k; # Maximum number and size of buffers used for reading large client request headers.
  client_body_buffer_size 16k;       # Sets buffer size for reading client request body.
  client_max_body_size 250m;         # Large File Uploads

  # Responses
  # ─────────────────────────────────────────────────────────────────────────────────────────
  proxy_buffering on;                # Enable Proxy Buffering

  proxy_buffer_size 32k;             # Size of the buffer used for reading the first part of the response.

  proxy_buffers 8 64k;               # Sets the number and size of the buffers used for reading a response from the proxied server,
                                      # for a single connection. The maximum RAM used per request equals Number multiplied by Size.
                                      # If a response exceeds the buffer, it is written to temporary disk, which can impact performance.

  proxy_busy_buffers_size 128k;      # Limits the total size of buffers that can be busy sending a response to the client while the
                                      # response is not yet fully read. The rest of the buffers can be used for reading the response.
                                      # It is recommended that this be 2 times the proxy_buffers size.

  proxy_max_temp_file_size 256m;    # The maximum size of a temporary file that can be created if the response does not fit into the
                                    # buffers. If the response is larger than this, it will be written to a temporary file on disk.

  # FastCGI (Common Gateway Interface) Responses
  fastcgi_buffer_size 32k;         # Buffer size for the headers
  fastcgi_buffers 8 32k;           # 8 buffers, each 32k for the response body
  fastcgi_busy_buffers_size 64k;   # Maximum size of busy buffers
  fastcgi_max_temp_file_size 128m; # Max temporary file size on disk

  ${nginx-locations}

}