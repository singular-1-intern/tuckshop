{{ if .Values.aadPodIdentity.enabled }}
{{- $fullName := include "neo-web-app.fullname" . -}}
apiVersion: "aadpodidentity.k8s.io/v1"
kind: AzureIdentity
metadata:
  name: {{ $fullName }}-azure-identity
  annotations:
    aadpodidentity.k8s.io/Behavior: namespaced  
spec:
  type: 0 # 0 is for user-assigned managed identity.
  resourceID: {{ .Values.aadPodIdentity.resourceId }}
  clientID: {{ .Values.aadPodIdentity.clientId }}
{{ end }}
