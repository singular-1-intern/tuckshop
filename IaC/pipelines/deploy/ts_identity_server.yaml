# Tuckshop.IdentityServer Deployment Pipelines
format_version: 9
pipelines:
  ts_deploy_ci_qa_identity_server:
    group: ts_deploy_ci_qa
    label_template: ${build}
    lock_behavior: unlockWhenFinished
    display_order: 2
    environment_variables:
      ProjectPrefix: ts
      HostPrefix: stg
      LocationPrefix: we
      EnvironmentPrefix: qa
    materials:
      build:
        ignore_for_scheduling: false
        pipeline: ts_build_ci_identity_server
        stage: build
    stages:
    - deploy:
        fetch_materials: true
        keep_artifacts: false
        clean_workspace: false
        approval:
          type: success
          allow_only_on_success: false
        jobs:
          deploy:
            timeout: 0
            tasks:
              - fetch:
                  is_file: false
                  source: IaC
                  pipeline: ts_build_ci_identity_server
                  stage: build
                  job: package
                  artifact_origin: gocd
                  run_if: passed
              - exec:
                  arguments:
                  - -c
                  - pwsh "./IaC/scripts/deploy/deploy-helm-chart.ps1" -AppName "identity-server" -Chart "./IaC/helm/neo-web-app" -ImageTag "$GO_PIPELINE_LABEL"
                  command: sh
                  working_directory: .
                  run_if: passed

